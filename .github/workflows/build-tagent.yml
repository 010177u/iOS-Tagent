name: Build iOS-Tagent IPA

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths:
      - '.github/workflows/**'

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_15.4.app || \
        sudo xcode-select -s /Applications/Xcode_15.3.app || \
        sudo xcode-select -s /Applications/Xcode.app
        xcodebuild -version
        echo "SDK:"
        xcodebuild -showsdks | grep iphoneos

    - name: Build for Testing
      run: |
        echo "=== 开始编译 iOS-Tagent ==="
        xcodebuild build-for-testing \
          -project WebDriverAgent.xcodeproj \
          -scheme WebDriverAgentRunner \
          -sdk iphoneos \
          -configuration Release \
          -derivedDataPath ./build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          ARCHS="arm64" \
          ONLY_ACTIVE_ARCH=NO \
          DEVELOPMENT_TEAM="" \
          PROVISIONING_PROFILE="" \
          2>&1 | tail -50
        echo "=== 编译完成 ==="

    - name: Package IPA
      run: |
        echo "=== 查找编译产物 ==="
        find ./build -name "*.app" -type d | head -20

        RUNNER_APP=$(find ./build -path "*/Release-iphoneos/WebDriverAgentRunner-Runner.app" -type d | head -1)
        if [ -z "$RUNNER_APP" ]; then
          RUNNER_APP=$(find ./build -path "*/Debug-iphoneos/WebDriverAgentRunner-Runner.app" -type d | head -1)
        fi
        if [ -z "$RUNNER_APP" ]; then
          RUNNER_APP=$(find ./build -name "*Runner*.app" -type d | head -1)
        fi

        if [ -z "$RUNNER_APP" ]; then
          echo "ERROR: 未找到 Runner.app"
          find ./build -name "*.app" -type d
          exit 1
        fi

        echo "找到: $RUNNER_APP"

        # 列出 app 内容
        ls -la "$RUNNER_APP/"
        echo "Info.plist:"
        cat "$RUNNER_APP/Info.plist" | head -30 || true

        # === TrollStore 兼容清理 ===
        # 删除 ldid 不支持的文件类型 (解决 Unsupported Mach-O type)
        echo "=== TrollStore 兼容清理 ==="
        find "$RUNNER_APP" -name "*.o" -delete 2>/dev/null && echo "已删除 .o 文件" || true
        find "$RUNNER_APP" -name "*.metallib" -delete 2>/dev/null && echo "已删除 .metallib" || true
        find "$RUNNER_APP" -name "*.dSYM" -exec rm -rf {} + 2>/dev/null && echo "已删除 .dSYM" || true
        find "$RUNNER_APP" -name "*.bcmap" -delete 2>/dev/null || true
        find "$RUNNER_APP" -name "*.car" -type f | while read f; do
          file_type=$(file -b "$f" 2>/dev/null)
          echo "  检查: $f -> $file_type"
        done

        # 用 lipo 确保所有二进制只包含 arm64
        find "$RUNNER_APP" -type f | while read f; do
          file_type=$(file -b "$f" 2>/dev/null)
          if echo "$file_type" | grep -q "Mach-O"; then
            archs=$(lipo -info "$f" 2>/dev/null | sed 's/.*: //')
            echo "  Mach-O: $f [$archs]"
            if echo "$archs" | grep -q "arm64e"; then
              echo "    -> 瘦身为 arm64"
              lipo -thin arm64 "$f" -output "${f}.thin" 2>/dev/null && mv "${f}.thin" "$f" || true
            fi
          fi
        done

        echo "=== 清理完成 ==="

        # 打包 IPA
        mkdir -p Payload
        cp -r "$RUNNER_APP" Payload/
        zip -r iOS-Tagent.ipa Payload/
        echo "IPA 大小:"
        ls -la iOS-Tagent.ipa

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: iOS-Tagent-IPA
        path: iOS-Tagent.ipa
        retention-days: 90
